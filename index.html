<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Kovil AI — Elite AI Engineers On Demand</title>
    <meta name="description" content="Kovil AI embeds vetted Tier-1 AI engineers into your team. Fixed-price AI projects, managed delivery, and AI app rescue. Free audit or matched in 48 hours." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#FF4F00" />
    <meta name="author" content="Kovil AI" />

    <!-- Canonical -->
    <link rel="canonical" href="https://kovil.ai/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kovil AI" />
    <meta property="og:title" content="Kovil AI — Elite AI Engineers On Demand" />
    <meta property="og:description" content="Kovil AI embeds vetted Tier-1 AI engineers into your team. Fixed-price AI projects, managed delivery, and AI app rescue. Free audit or matched in 48 hours." />
    <meta property="og:url" content="https://kovil.ai/" />
    <meta property="og:image" content="https://kovil.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kovil AI — Elite AI Engineers On Demand" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kovilai" />
    <meta name="twitter:title" content="Kovil AI — Elite AI Engineers On Demand" />
    <meta name="twitter:description" content="Kovil AI embeds vetted Tier-1 AI engineers into your team. Fixed-price AI projects, managed delivery, and AI app rescue. Free audit or matched in 48 hours." />
    <meta name="twitter:image" content="https://kovil.ai/og-image.png" />

    <!-- Google Fonts: preconnect first, then stylesheet (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/kovil-logo-symbol.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/kovil-logo-symbol.png" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kovil AI",
      "url": "https://kovil.ai",
      "logo": "https://kovil.ai/kovil-logo-symbol.png",
      "description": "Kovil AI embeds vetted Tier-1 AI engineers into your team. Fixed-price AI projects, managed delivery, and AI app rescue.",
      "sameAs": [
        "https://www.linkedin.com/company/kovil-ai/"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@kovil.ai",
        "contactType": "customer support"
      }
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kovil AI",
      "url": "https://kovil.ai"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
